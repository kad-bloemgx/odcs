version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./ddl-generator/personen.sql:/docker-entrypoint-initdb.d/personen.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  postgrest:
    image: postgrest/postgrest:latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ddl-generator/postgrest.conf:/etc/postgrest.conf:ro
    command: ["postgrest", "/etc/postgrest.conf"]
    ports:
      - "3000:3000"
    restart: unless-stopped

  swagger:
    image: swaggerapi/swagger-ui:latest
    environment:
      # Swagger UI runs in the browser; point it to the host-exposed PostgREST API
      # By default Swagger UI loads a static OpenAPI spec served by `openapi-server`.
      SWAGGER_JSON: "http://localhost:8081/openapi.yaml"
    ports:
      - "8080:8080"
    depends_on:
      - postgrest

  openapi-server:
    image: nginx:alpine
    volumes:
      - ./openapi/generated-openapi-spec.yaml:/usr/share/nginx/html/openapi.yaml:ro
    ports:
      - "8081:80"
    restart: unless-stopped

