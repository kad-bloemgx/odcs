dataContractSpecification: 3.1.0
id: personen
name: Personen
version: 1.0.0
description: Eenvoudig datacontract met persoonlijke gegevens
owner: Kadaster
publisher: Kadaster
contactPoint: data@kadaster.nl
license: CC0 1.0
licenseUrl: https://creativecommons.org/publicdomain/zero/1.0/
issued: 2026-06-09
modified: 2026-06-09
keywords:
  - personen
  - adres
  - contact

servers:
  - url: https://api.kadaster.nl/v1
    description: Production
  - url: https://api-dev.kadaster.nl/v1
    description: Development

formats:
  - json
  - csv
  - parquet

sla:
  availability_target: 99.5% monthly
  freshness_max_hours: 24
  response_time_p99_ms: 500

schema:
  type: object
  properties:
    id:
      type: string
      description: Unieke identificatie van de persoon
    naam:
      type: string
      description: Volledige naam van de persoon
    adres_id:
      type: string
      description: Referentie naar de ADRES entity
      relationships:
        - type: foreignKey
          to: adressen.id
  required:
    - id
    - naam
    - adres_id

adresSchema:
  type: object
  properties:
    id:
      type: string
      description: Unieke adres ID
    straat:
      type: string
      description: Straatnaam
    huisnummer:
      type: string
      description: Huisnummer
    postcode:
      type: string
      description: Postcode
    woonplaats:
      type: string
      description: Woonplaats of gemeente
    personen:
      type: array
      description: Personen die op dit adres wonen
      items:
        type: string
      relationships:
        - type: inverseForeignKey
          to: personen.adres_id
  required:
    - id
    - straat
    - huisnummer
    - postcode
    - woonplaats

examples:
  personen:
    - id: "123456"
      naam: "Jan Jansen"
      adres_id: "ADDR001"
    - id: "123458"
      naam: "Pietje Puk"
      adres_id: "ADDR001"
    - id: "123457"
      naam: "Maria Pieterse"
      adres_id: "ADDR002"
  adressen:
    - id: "ADDR001"
      straat: "Koppejan"
      huisnummer: "1"
      postcode: "7461 DB"
      woonplaats: "Rijssen"
    - id: "ADDR002"
      straat: "Kerkweg"
      huisnummer: "42"
      postcode: "7411 CX"
      woonplaats: "Deventer"

