# Example custom values for ODCS Helm Chart
# Use this as a template for your own custom configurations

# Kubernetes namespace
namespace: odcs

# PostgreSQL configuration
postgres:
  image:
    tag: "15"

  user: postgres
  password: "secure_password_here"  # CHANGE THIS!
  database: postgres

  storage:
    enabled: true
    size: 20Gi
    storageClass: "fast-ssd"  # Adjust based on your K8s cluster
    accessMode: ReadWriteOnce

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

# PostgREST configuration
postgrest:
  image:
    tag: "v10.2"

  dbPassword: "postgrest"  # PostgREST role password (in init SQL)

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Swagger UI configuration
swagger:
  image:
    tag: "latest"

  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# OpenAPI spec server (nginx)
openapi:
  image:
    tag: "alpine"

  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Ingress configuration (enables external access)
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: odcs.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: odcs-tls
      hosts:
        - odcs.example.com

