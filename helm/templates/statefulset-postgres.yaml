apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: odcs-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: odcs-postgres
spec:
  serviceName: odcs-postgres
  replicas: 1
  selector:
    matchLabels:
      app: odcs-postgres
  template:
    metadata:
      labels:
        app: odcs-postgres
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
        ports:
        - name: postgresql
          containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.user }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgres.password }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.database }}
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
          readOnly: true
        livenessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pg_isready -U {{ .Values.postgres.user }}
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
              - /bin/sh
              - -c
              - pg_isready -U {{ .Values.postgres.user }}
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
      volumes:
      - name: init-sql
        configMap:
          name: odcs-postgres-init-sql
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.postgres.storage.storageClass }}
      storageClassName: {{ .Values.postgres.storage.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.postgres.storage.size }}

