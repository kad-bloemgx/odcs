apiVersion: apps/v1
kind: Deployment
metadata:
  name: odcs-swagger
  namespace: {{ .Values.namespace }}
  labels:
    app: odcs-swagger
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: odcs-swagger
  template:
    metadata:
      labels:
        app: odcs-swagger
    spec:
      containers:
      - name: swagger-ui
        image: "{{ .Values.swagger.image.repository }}:{{ .Values.swagger.image.tag }}"
        imagePullPolicy: {{ .Values.swagger.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
        env:
        - name: SWAGGER_JSON
          value: "{{ .Values.swagger.apiUrl }}"
        - name: SWAGGER_JSON_URL
          value: "{{ .Values.swagger.apiUrl }}"
        - name: URL
          value: "{{ .Values.swagger.apiUrl }}"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.swagger.resources | nindent 10 }}

