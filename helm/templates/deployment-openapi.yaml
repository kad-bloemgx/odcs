apiVersion: apps/v1
kind: Deployment
metadata:
  name: odcs-openapi-server
  namespace: {{ .Values.namespace }}
  labels:
    app: odcs-openapi-server
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: odcs-openapi-server
  template:
    metadata:
      labels:
        app: odcs-openapi-server
    spec:
      containers:
      - name: nginx
        image: "{{ .Values.openapi.image.repository }}:{{ .Values.openapi.image.tag }}"
        imagePullPolicy: {{ .Values.openapi.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 80
        volumeMounts:
        - name: openapi-spec
          mountPath: /usr/share/nginx/html
          readOnly: true
        livenessProbe:
          httpGet:
            path: /openapi.yaml
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /openapi.yaml
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.openapi.resources | nindent 10 }}
      volumes:
      - name: openapi-spec
        configMap:
          name: odcs-openapi-spec

